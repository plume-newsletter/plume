name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      # The web bundle is embedded via //go:embed; provide a placeholder so the
      # backend builds without the Node toolchain in this job.
      - name: Ensure embed dir exists
        run: mkdir -p web/dist && [ -f web/dist/index.html ] || echo '<!doctype html><title>Plume</title>' > web/dist/index.html
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && echo 'Run gofmt' && exit 1)
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...    # integration tests use Docker (preinstalled on the runner) via Testcontainers

  frontend:
    name: Frontend (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx oxlint
      - run: npm test
      - run: npm run build
